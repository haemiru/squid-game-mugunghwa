<style>

<!-- ── THREE.JS r152 via CDN ── -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
/*
 * ============================================================
 * Project: Squid Game - Red Light Green Light
 * Created for JunoMinu Company
 * ⓒ JunoMinu Company. All rights reserved.
 * ============================================================
 *
 * A 3D browser game using Three.js. The player (number 107) must
 * cross a large field while the doll Young-hee calls out
 * "무궁화 꽃이 피었습니다". Move only while she faces away.
 * Stop when she turns around or be eliminated.
 * ============================================================
 */

// ═══════════════════════════════════════════════════
//  CONFIGURATION
// ═══════════════════════════════════════════════════
const isMobile = /Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
  || (navigator.maxTouchPoints > 1);

const CFG = {
  // Field dimensions
  fieldLength  : 130,     // total Z distance from start to doll
  fieldWidth   : 36,      // X width of the arena
  finishZ      : -125,    // Z position of the finish line
  startZ       : 3,       // Z position of the player start
  dollZ        : -130,    // Z position of Young-hee

  // Timing
  totalTime    : 40,      // seconds
  turnDuration : 0.25,    // seconds for Young-hee to rotate (faster snap)
  redLightMin  : 1.2,     // min seconds Young-hee watches
  redLightMax  : 5.5,     // max seconds Young-hee watches

  // Gameplay
  playerSpeed  : 3.5,     // units per second (50% of previous)
  detectionThreshold : 0.06,  // tighter detection
  npcCount     : isMobile ? 35 : 99,
  recklessRate : 0.18,    // ~18% of NPCs may stop late

  // Camera
  camHeight    : 5,
  camDistance   : 8,
  camLerp      : 3.5,
};


// ═══════════════════════════════════════════════════
//  GLOBAL STATE
// ═══════════════════════════════════════════════════
let scene, camera, renderer, clock;
let player, younghee, finishLineMesh;
let npcs = [];

// Game state machine: 'waiting' | 'countdown' | 'playing' | 'won' | 'lost'
let gameState = 'waiting';
// Phase within 'playing': 'green' | 'turning-red' | 'red' | 'turning-green'
let phase = 'green';
let timeLeft = CFG.totalTime;

let keys = {};                 // currently pressed keys
let playerPrevPos = null;      // player position snapshot for detection
let redLightTimer = 0;         // how long we've been in red light
let redLightDuration = 2;      // current red light watch time (randomised)

// Younghee rotation state
let yhStartRot = 0;            // start Y rotation for current turn
let yhEndRot = 0;              // end Y rotation for current turn
let yhTurnProgress = 0;        // 0 → 1 progress of turning
let yhTurning = false;

// Visual effect pools
let elimQueue = [];            // queued eliminations { char, isPlayer, delay }
let elimAnims = [];            // active collapse animations
let particles = [];            // blood splatter particles
let laserBeams = [];           // laser targeting lines
let dollEyes = [];             // references to eye meshes
let muzzleFlash = null;        // muzzle flash mesh

// Audio
let audioCtx = null;           // Web Audio API context (created on user gesture)
const audioFiles = [];
let currentAudio = null;
let controlsHintTimer = 6;

// Preload all audio files into memory so they play instantly
const preloadedAudios = [];
for (let i = 1; i <= 7; i++) {
  const path = `audio/younghee${i}.MP3`;
  audioFiles.push(path);
  const a = new Audio(path);
  a.preload = 'auto';
  a.volume = 0.85;
  a.load();
  preloadedAudios.push(a);
}


// ═══════════════════════════════════════════════════
//  AUDIO HELPERS
// ═══════════════════════════════════════════════════

/**
 * Play a random Young-hee voice clip directly from preloaded pool.
 * Reuses the same Audio object (reset to start) for zero latency.
 */
function playYoungheeVoice() {
  // Stop previous audio if still playing
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.removeEventListener('ended', onVoiceEnded);
  }
  const idx = Math.floor(Math.random() * preloadedAudios.length);
  currentAudio = preloadedAudios[idx];
  currentAudio.currentTime = 0;
  currentAudio.play().catch(() => {});
  currentAudio.addEventListener('ended', onVoiceEnded);
}

function onVoiceEnded() {
  if (currentAudio) currentAudio.removeEventListener('ended', onVoiceEnded);
  if (gameState === 'playing') beginTurnToRed();
}

/**
 * Synthesise a short gunshot / crack sound via Web Audio API.
 * Uses noise burst with exponential decay.
 */
function playGunshot() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const dur = 0.18;
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) {
      const t = i / audioCtx.sampleRate;
      // Sharp crack that decays quickly
      d[i] = (Math.random() * 2 - 1) * Math.exp(-t * 35) * 0.7;
    }
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    // Low-pass filter for more realistic gunshot
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 3000;
    src.connect(filter);
    filter.connect(audioCtx.destination);
    src.start();
  } catch(e) { /* audio not available */ }
}

/**
 * Create a "ding" success sound for winning.
 */
function playWinSound() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(523, audioCtx.currentTime);
    osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.15);
    osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.3);
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.6);
  } catch(e) {}
}


// ═══════════════════════════════════════════════════
//  THREE.JS INITIALISATION
// ═══════════════════════════════════════════════════
function init() {
  // ── Mobile class ──
  if (isMobile) document.body.classList.add('is-mobile');

  // ── Scene ──
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x7a7a7a);
  scene.fog = new THREE.FogExp2(0x7a7a7a, 0.006);

  // ── Camera ──
  camera = new THREE.PerspectiveCamera(
    58, window.innerWidth / window.innerHeight, 0.1, 400
  );
  camera.position.set(0, CFG.camHeight, CFG.startZ + CFG.camDistance);

  // ── Renderer ──
  const maxPixelRatio = isMobile ? 1.5 : 2;
  renderer = new THREE.WebGLRenderer({ antialias: !isMobile, powerPreference: 'high-performance' });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, maxPixelRatio));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = isMobile ? THREE.PCFShadowMap : THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;
  document.body.insertBefore(renderer.domElement, document.body.firstChild);

  clock = new THREE.Clock();

  // ── Lighting ──
  // Ambient fill
  scene.add(new THREE.AmbientLight(0xc0b8b0, 0.55));

  // Hemisphere light for sky/ground colour gradient
  const hemi = new THREE.HemisphereLight(0x9999aa, 0x665544, 0.35);
  scene.add(hemi);

  // Main directional (sun) light with shadows
  const sun = new THREE.DirectionalLight(0xffeedd, 1.1);
  sun.position.set(20, 35, 15);
  sun.castShadow = true;
  sun.shadow.mapSize.set(isMobile ? 1024 : 2048, isMobile ? 1024 : 2048);
  sun.shadow.camera.left   = -50;
  sun.shadow.camera.right  =  50;
  sun.shadow.camera.top    =  15;
  sun.shadow.camera.bottom = -150;
  sun.shadow.camera.near   = 1;
  sun.shadow.camera.far    = 200;
  sun.shadow.bias = -0.001;
  scene.add(sun);

  // ── Build world ──
  buildGround();
  buildWalls();
  buildFinishLine();
  buildYounghee();
  buildStartLine();
  buildPlayer();
  buildNPCs();

  // ── Input ──
  window.addEventListener('keydown', e => { keys[e.key] = true; });
  window.addEventListener('keyup',   e => { keys[e.key] = false; });
  window.addEventListener('resize', onResize);

  document.getElementById('start-btn').addEventListener('click', startGame);
  document.getElementById('restart-btn').addEventListener('click', restartGame);

  // Spacebar to start or restart
  window.addEventListener('keydown', e => {
    if (e.code === 'Space') {
      e.preventDefault();
      if (gameState === 'waiting') startGame();
      else if (gameState === 'won' || gameState === 'lost') restartGame();
    }
  });

  // ── Mobile joystick ──
  if (isMobile) initJoystick();

  // ── Begin render loop ──
  animate();
}


function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}


// ═══════════════════════════════════════════════════
//  ENVIRONMENT BUILDING
// ═══════════════════════════════════════════════════

/**
 * Build the concrete ground plane with procedural grid texture.
 */
function buildGround() {
  const size = 512;
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');

  // Base concrete colour
  ctx.fillStyle = '#9e9080';
  ctx.fillRect(0, 0, size, size);

  // Subtle grid lines
  ctx.strokeStyle = 'rgba(80,70,60,0.3)';
  ctx.lineWidth = 1;
  const step = 32;
  for (let i = 0; i <= size; i += step) {
    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, size); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(size, i); ctx.stroke();
  }

  // Noise speckling for realism
  for (let i = 0; i < 5000; i++) {
    ctx.fillStyle = `rgba(${Math.random() > 0.5 ? 0 : 60},${Math.random() > 0.5 ? 0 : 40},${Math.random() > 0.5 ? 0 : 30},${Math.random() * 0.06})`;
    ctx.fillRect(Math.random() * size, Math.random() * size, 1 + Math.random() * 2, 1 + Math.random() * 2);
  }

  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(10, 10);

  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(100, 100),
    new THREE.MeshStandardMaterial({ map: tex, roughness: 0.92, metalness: 0.05 })
  );
  ground.rotation.x = -Math.PI / 2;
  ground.position.set(0, 0, -60);
  ground.receiveShadow = true;
  scene.add(ground);

  // Second ground tile to cover the longer field
  const ground2 = new THREE.Mesh(
    new THREE.PlaneGeometry(100, 100),
    new THREE.MeshStandardMaterial({ map: tex.clone(), roughness: 0.92, metalness: 0.05 })
  );
  ground2.material.map.wrapS = ground2.material.map.wrapT = THREE.RepeatWrapping;
  ground2.material.map.repeat.set(10, 10);
  ground2.rotation.x = -Math.PI / 2;
  ground2.position.set(0, 0, -140);
  ground2.receiveShadow = true;
  scene.add(ground2);
}

/**
 * Build arena side walls (Squid Game pink/salmon colour).
 */
function buildWalls() {
  const wallMat = new THREE.MeshStandardMaterial({
    color: 0xe8b4b8, roughness: 0.75, metalness: 0.05
  });
  const halfW = CFG.fieldWidth / 2;

  // Left wall
  const wallL = new THREE.Mesh(new THREE.BoxGeometry(1, 10, 160), wallMat);
  wallL.position.set(-halfW - 0.5, 5, -60);
  wallL.castShadow = true;
  wallL.receiveShadow = true;
  scene.add(wallL);

  // Right wall
  const wallR = wallL.clone();
  wallR.position.x = halfW + 0.5;
  scene.add(wallR);

  // Back wall (well behind camera so it doesn't block the view)
  const wallB = new THREE.Mesh(new THREE.BoxGeometry(CFG.fieldWidth + 2, 10, 1), wallMat);

/**

function buildYounghee() {
  younghee = new THREE.Group();

  const head = new THREE.Mesh(new THREE.SphereGeometry(0.8, 20, 16), skinMat);

  // Cheek blush (subtle pink circles)

    const blush = new THREE.Mesh(new THREE.CircleGeometry(0.15, 12), blushMat);
    blush.position.set(xOff, 5.4, -0.72);

  // Mouth (small dark line)

    new THREE.SphereGeometry(0.85, 16, 12, 0, Math.PI * 2, 0, Math.PI * 0.55),

  );

  // Bangs (fringe)

    );

    // Ball at end of pigtail

    ball.position.set(side * 1.0, 4.3, 0);
    younghee.add(ball);

    // Hair tie (red)

      new THREE.TorusGeometry(0.14, 0.04, 8, 12),

  // Pine foliage layers (cone-shaped, stacked, getting smaller toward top)

    { r: 2.6, h: 3.2, y: 17.8 },

    { r: 1.0, h: 2.5, y: 21.5 },  // top layer (smallest)

  layers.forEach((l, i) => {
    const mat = i % 2 === 0 ? pineMat : pineDarkMat;
    const cone = new THREE.Mesh(new THREE.ConeGeometry(l.r, l.h, 12), mat);
    cone.position.set(0, l.y, treeZ);
    cone.castShadow = true;
    cone.receiveShadow = true;
    scene.add(cone);
  });

  // Tree top point
  const topCone = new THREE.Mesh(
    new THREE.ConeGeometry(0.4, 1.5, 8),
    pineMat
  );

  topCone.castShadow = true;
  scene.add(topCone);
}


// ═══════════════════════════════════════════════════
//  HUMANOID CHARACTER BUILDER
// ═══════════════════════════════════════════════════

/**
 * Create a humanoid character in green tracksuit with a number.
 * @param {number} number - Player number (1-456)
 * @param {number} hScale - Height multiplier (0.85 - 1.1)
 * @returns {THREE.Group} The character group
 */
function buildHumanoid(number, hScale = 1.0) {
  const g = new THREE.Group();
  const hs = hScale;

  // Materials
  const suitMat  = new THREE.MeshStandardMaterial({ color: 0x1a8a5c, roughness: 0.75 });
  const skinMat  = new THREE.MeshStandardMaterial({ color: 0xffe0bd, roughness: 0.6 });
  const shoeMat  = new THREE.MeshStandardMaterial({ color: 0x333333 });
  const hairMat  = new THREE.MeshStandardMaterial({ color: 0x1a1a1a });

  // ── Torso ──
  const torso = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.95 * hs, 0.38), suitMat);
  torso.position.y = 1.4 * hs;
  torso.castShadow = true;
  g.add(torso);

  // ── Number decal (front and back) ──
  const numTex = makeNumberTexture(number);
  const decalMat = new THREE.MeshStandardMaterial({ map: numTex, transparent: true });
  // Front
  const front = new THREE.Mesh(new THREE.PlaneGeometry(0.52, 0.28), decalMat);
  front.position.set(0, 1.48 * hs, 0.195);
  g.add(front);
  // Back
  const back = new THREE.Mesh(new THREE.PlaneGeometry(0.52, 0.28), decalMat);
  back.position.set(0, 1.48 * hs, -0.195);
  back.rotation.y = Math.PI;
  g.add(back);

  // ── Head ──
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.24, 12, 10), skinMat);
  head.position.y = 2.12 * hs;
  head.castShadow = true;
  g.add(head);

  // Hair cap
  const hair = new THREE.Mesh(
    new THREE.SphereGeometry(0.25, 12, 8, 0, Math.PI * 2, 0, Math.PI * 0.55),
    hairMat
  );
  hair.position.y = 2.16 * hs;
  g.add(hair);

  // ── Legs ──
  const legGeo = new THREE.CylinderGeometry(0.1, 0.1, 0.85 * hs, 7);
  const legL = new THREE.Mesh(legGeo, suitMat.clone());
  legL.position.set(-0.16, 0.5 * hs, 0);
  legL.castShadow = true;
  g.add(legL);
  const legR = new THREE.Mesh(legGeo, suitMat.clone());
  legR.position.set(0.16, 0.5 * hs, 0);
  legR.castShadow = true;
  g.add(legR);

  // ── Arms ──
  const armGeo = new THREE.CylinderGeometry(0.07, 0.07, 0.72 * hs, 7);
  const armL = new THREE.Mesh(armGeo, suitMat.clone());
  armL.position.set(-0.4, 1.32 * hs, 0);
  armL.castShadow = true;
  g.add(armL);
  const armR = new THREE.Mesh(armGeo, suitMat.clone());
  armR.position.set(0.4, 1.32 * hs, 0);
  armR.castShadow = true;
  g.add(armR);

  // ── Shoes ──
  const shoeGeo = new THREE.BoxGeometry(0.15, 0.09, 0.24);
  const shoeL = new THREE.Mesh(shoeGeo, shoeMat);
  shoeL.position.set(-0.16, 0.045, 0.03);
  g.add(shoeL);
  const shoeR = new THREE.Mesh(shoeGeo, shoeMat);
  shoeR.position.set(0.16, 0.045, 0.03);
  g.add(shoeR);

  // Store limb refs for walk animation
  g.userData.legL = legL;
  g.userData.legR = legR;
  g.userData.armL = armL;
  g.userData.armR = armR;
  g.userData.walkPhase = Math.random() * Math.PI * 2;
  g.userData.moving = false;

  return g;
}

/**
 * Generate a canvas texture with a 3-digit number in white on green.
 */
function makeNumberTexture(num) {
  const c = document.createElement('canvas');
  c.width = 128; c.height = 64;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#1a8a5c';
  ctx.fillRect(0, 0, 128, 64);
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 38px Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(String(num).padStart(3, '0'), 64, 33);
  return new THREE.CanvasTexture(c);
}


// ═══════════════════════════════════════════════════
//  PLAYER (107번)
// ═══════════════════════════════════════════════════
function buildPlayer() {
  player = buildHumanoid(107, 1.0);
  player.position.set(0, 0, CFG.startZ);
  player.userData.alive = true;
  // Tint player suit slightly faded/lighter to distinguish from NPCs
  player.traverse(child => {
    if (child.isMesh && child.material && child.material.color) {
      const hex = child.material.color.getHex();
      if (hex === 0x1a8a5c) { // green suit parts only
        child.material = child.material.clone();
        child.material.color.setHex(0x5cb88a); // lighter, faded green
      }
    }
  });
  scene.add(player);
}


// ═══════════════════════════════════════════════════
//  NPC PLAYERS (50명)
// ═══════════════════════════════════════════════════
function buildNPCs() {
  npcs = [];
  const usedNums = new Set([107]);

  for (let i = 0; i < CFG.npcCount; i++) {
    // Unique random number 1-456
    let num;
    do { num = Math.floor(Math.random() * 456) + 1; } while (usedNums.has(num));
    usedNums.add(num);

    const scale = 0.88 + Math.random() * 0.22;
    const npc = buildHumanoid(num, scale);

    // Random starting position across the field
    const x = (Math.random() - 0.5) * (CFG.fieldWidth - 4);
    const z = CFG.startZ + (Math.random() - 0.5) * 5;
    npc.position.set(x, 0, z);

    // NPC AI properties
    npc.userData.alive = true;
    npc.userData.speed = 1.0 + Math.random() * 2.75;  // 50% of previous
    npc.userData.prevPos = new THREE.Vector3().copy(npc.position);
    npc.userData.lateralDrift = (Math.random() - 0.5) * 3.0;  // much wider zigzag
    npc.userData.lateralTimer = Math.random() * Math.PI * 2;   // phase offset for direction changes
    npc.userData.swayPhase = Math.random() * Math.PI * 2;
    npc.userData.swaySpeed = 1.0 + Math.random() * 1.5;
    // Red light fail: how long this NPC keeps moving into red light (0 = stops perfectly)
    npc.userData.redLightFail = 0;       // set each round
    npc.userData.redLightFailLeft = 0;   // countdown
    npc.userData.markedForDeath = false;  // flagged for elimination this round
    npc.userData.deathQueued = false;     // already queued for execution

    scene.add(npc);
    npcs.push(npc);
  }
}


// ═══════════════════════════════════════════════════
//  GAME STATE MANAGEMENT
// ═══════════════════════════════════════════════════

function startGame() {
  document.getElementById('start-screen').style.display = 'none';
  // Ensure audio context is created on user gesture
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  // Reset clock so first dt isn't huge from idle time on start screen
  clock.getDelta();
  gameState = 'playing';
  timeLeft = CFG.totalTime;
  // Start green light immediately with voice
  phase = 'green';
  updatePhaseUI();
  snapshotAllPositions();
  playYoungheeVoice();
  // Snap camera immediately AND force a render so screen shows right away
  snapCameraToPlayer();
  renderer.render(scene, camera);
}

function restartGame() {
  // Stop any playing audio
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }

  // Remove old characters from scene
  npcs.forEach(n => scene.remove(n));
  scene.remove(player);

  // Clear effect pools
  particles.forEach(p => scene.remove(p));
  particles = [];
  laserBeams.forEach(l => scene.remove(l.mesh));
  laserBeams = [];
  elimQueue = [];
  elimAnims = [];

  // Rebuild characters
  buildPlayer();
  buildNPCs();

  // Reset Young-hee
  younghee.rotation.y = 0;
  yhTurning = false;
  setEyeGlow(false);
  muzzleFlash.material.opacity = 0;

  // Snap camera and reset clock
  snapCameraToPlayer();
  clock.getDelta();

  // Reset state
  gameState = 'playing';
  phase = 'green';
  timeLeft = CFG.totalTime;
  keys = {};
  controlsHintTimer = 6;
  document.getElementById('controls-hint').style.opacity = '1';
  document.getElementById('restart-btn').style.display = 'none';
  document.getElementById('center-msg').classList.remove('show');
  document.getElementById('timer').classList.remove('urgent');

  updateHUD();
  // Start green light immediately with voice
  phase = 'green';
  updatePhaseUI();
  snapshotAllPositions();
  playYoungheeVoice();
  // Force immediate render
  snapCameraToPlayer();
  renderer.render(scene, camera);
}


// ═══════════════════════════════════════════════════
//  PHASE TRANSITIONS
// ═══════════════════════════════════════════════════

/**
 * Begin green light: Young-hee turns to face the tree,
 * then plays a random voice clip.
 */
function beginGreenLight() {
  if (gameState !== 'playing') return;

  // Cancel any remaining queued eliminations from previous red phase
  elimQueue = [];

  phase = 'turning-green';
  yhStartRot = Math.PI;
  yhEndRot = 0;   // face away (toward -Z / tree)
  yhTurnProgress = 0;
  yhTurning = true;
  setEyeGlow(false);

  // After turn completes, start green phase
  setTimeout(() => {
    if (gameState !== 'playing') return;
    phase = 'green';
    updatePhaseUI();
    // Snapshot positions for detection reference
    snapshotAllPositions();
    // Reset reckless NPC stop delays for next cycle
    npcs.forEach(n => { n.userData.stopDelayLeft = n.userData.stopDelay; });
    // Play the voice
    playYoungheeVoice();
  }, CFG.turnDuration * 1000);
}

/**
 * Begin turning to red light: Young-hee rotates to face the players.
 * Before turning, assign random NPCs to "fail" — they will keep
 * visibly running during red light and then get shot.
 */
function beginTurnToRed() {
  if (gameState !== 'playing') return;

  // Decide which NPCs will fail to stop this round (5~20)
  assignRedLightFailures();

  phase = 'turning-red';
  yhStartRot = 0;
  yhEndRot = Math.PI;  // face players (+Z direction)
  yhTurnProgress = 0;
  yhTurning = true;

  // After turn completes, enter red phase
  setTimeout(() => {
    if (gameState !== 'playing') return;
    phase = 'red';
    setEyeGlow(true);
    updatePhaseUI();
    redLightDuration = CFG.redLightMin + Math.random() * (CFG.redLightMax - CFG.redLightMin);
    redLightTimer = 0;
    // Snapshot positions NOW — NPCs that keep moving after this get detected
    snapshotAllPositions();
  }, CFG.turnDuration * 1000);
}

/**
 * Pick 5-20 alive NPCs and assign them to keep moving during red light.
 * They will visibly stumble/run, then get shot by Young-hee.
 */
function assignRedLightFailures() {
  const aliveNPCs = npcs.filter(n => n.userData.alive);
  if (aliveNPCs.length === 0) return;

  // Reset all
  aliveNPCs.forEach(n => {
    n.userData.redLightFail = 0;
    n.userData.redLightFailLeft = 0;
    n.userData.markedForDeath = false;
    n.userData.deathQueued = false;
  });

  const baseKill = isMobile
    ? 2 + Math.floor(Math.random() * 5)   // 2 ~ 6
    : 5 + Math.floor(Math.random() * 16); // 5 ~ 20
  const killCount = Math.min(aliveNPCs.length, baseKill);

  // Shuffle and pick victims
  const shuffled = [...aliveNPCs];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }

  shuffled.slice(0, killCount).forEach(npc => {
    // Each doomed NPC will keep moving for 0.3~0.8s into red light
    const failDuration = 0.3 + Math.random() * 0.5;
    npc.userData.redLightFail = failDuration;
    npc.userData.redLightFailLeft = failDuration;
    npc.userData.markedForDeath = true;
  });
}

/**
 * Save current positions of player and all alive NPCs.
 */
function snapshotAllPositions() {
  playerPrevPos = player.position.clone();
  npcs.forEach(n => {
    if (n.userData.alive) n.userData.prevPos.copy(n.position);
  });
}

/**
 * Toggle Young-hee's eye glow on/off.
 */
function setEyeGlow(on) {
  dollEyes.forEach(eye => {
    if (on) {
      eye.material.color.setHex(0xff0000);
      eye.material.emissive = new THREE.Color(0xff0000);
      eye.material.emissiveIntensity = 2.5;
    } else {
      eye.material.color.setHex(0x111111);
      eye.material.emissive = new THREE.Color(0x000000);
      eye.material.emissiveIntensity = 0;
    }
  });
}


// ═══════════════════════════════════════════════════
//  HUD UPDATES
// ═══════════════════════════════════════════════════

function updatePhaseUI() {
  const el = document.getElementById('phase');
  if (phase === 'green' || phase === 'turning-green') {
    el.textContent = '무궁화 꽃이 피었습니다...';
    el.className = 'green';
  } else {
    el.textContent = '멈춰! STOP!';
    el.className = 'red';
  }
}

function showCenterMsg(text, duration) {
  const el = document.getElementById('center-msg');
  el.textContent = text;
  el.classList.add('show');
  if (duration) setTimeout(() => el.classList.remove('show'), duration);
}

function updateHUD() {
  // Timer
  const mins = Math.floor(timeLeft / 60);
  const secs = Math.floor(timeLeft % 60);
  const timerEl = document.getElementById('timer');
  timerEl.textContent = String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
  // Urgent styling when under 30 seconds
  if (timeLeft <= 30) timerEl.classList.add('urgent');
  else timerEl.classList.remove('urgent');

  // Alive count
  const npcAlive = npcs.filter(n => n.userData.alive).length;
  const total = CFG.npcCount + 1;
  const alive = (player.userData.alive ? 1 : 0) + npcAlive;
  document.getElementById('alive').textContent = `${alive} / ${total}`;
}


// ═══════════════════════════════════════════════════
//  ELIMINATION
// ═══════════════════════════════════════════════════

/**
 * Queue a character for elimination with an optional delay
 * to stagger multiple kills visually.
 */
function queueElimination(character, isPlayer, delay) {
  if (!character.userData.alive) return;
  character.userData.alive = false;
  elimQueue.push({ char: character, isPlayer, delay });
}

/**
 * Execute elimination: laser, gunshot, particles, collapse.
 */
function executeElimination(character, isPlayer) {
  playGunshot();

  // ── Laser beam from Young-hee to target ──
  const from = new THREE.Vector3(0, 5.6, CFG.dollZ);
  const to = character.position.clone();
  to.y = 1.4;
  const laserGeo = new THREE.BufferGeometry().setFromPoints([from, to]);
  const laserMat = new THREE.LineBasicMaterial({
    color: 0xff0000, transparent: true, opacity: 0.9
  });
  const laser = new THREE.Line(laserGeo, laserMat);
  scene.add(laser);
  laserBeams.push({ mesh: laser, life: 0.4 });

  // ── Muzzle flash ──
  muzzleFlash.material.opacity = 1;
  setTimeout(() => { muzzleFlash.material.opacity = 0; }, 120);

  // ── Blood splatter particles ──
  const particleCount = isMobile ? 8 : 20;
  for (let i = 0; i < particleCount; i++) {
    const pGeo = new THREE.SphereGeometry(0.04 + Math.random() * 0.06, 4, 4);
    const pMat = new THREE.MeshStandardMaterial({
      color: new THREE.Color().setHSL(0, 0.9, 0.15 + Math.random() * 0.2),
      transparent: true, opacity: 1
    });
    const p = new THREE.Mesh(pGeo, pMat);
    p.position.copy(character.position);
    p.position.y = 1.0 + Math.random() * 0.8;
    p.userData.vel = new THREE.Vector3(
      (Math.random() - 0.5) * 5,
      Math.random() * 4 + 1,
      (Math.random() - 0.5) * 5
    );
    p.userData.life = 1.0 + Math.random() * 0.5;
    scene.add(p);
    particles.push(p);
  }

  // ── Collapse animation ──
  elimAnims.push({ char: character, progress: 0 });

  // ── Player death = game over ──
  if (isPlayer) {
    gameState = 'lost';
    setTimeout(() => {
      showCenterMsg('ELIMINATED');
      document.getElementById('restart-btn').style.display = 'block';
    }, 600);
  }
}


// ═══════════════════════════════════════════════════
//  PLAYER UPDATE
// ═══════════════════════════════════════════════════

function updatePlayer(dt) {
  if (!player.userData.alive) return;

  let isMoving = false;
  const speed = CFG.playerSpeed * dt;
  const dir = new THREE.Vector3(0, 0, 0);

  if (keys['ArrowUp']    || keys['w'] || keys['W']) dir.z = -1;
  if (keys['ArrowDown']  || keys['s'] || keys['S']) dir.z =  1;
  if (keys['ArrowLeft']  || keys['a'] || keys['A']) dir.x = -1;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) dir.x =  1;

  if (dir.lengthSq() > 0) {
    dir.normalize().multiplyScalar(speed);
    // Player ALWAYS moves when keys are pressed — even during Red Light
    // This means pressing keys during Red Light = getting caught!
    player.position.add(dir);
    isMoving = true;

    // Face movement direction
    player.rotation.y = Math.atan2(dir.x, dir.z);

    // Clamp to field bounds
    const halfW = CFG.fieldWidth / 2 - 1;
    player.position.x = THREE.MathUtils.clamp(player.position.x, -halfW, halfW);
    player.position.z = THREE.MathUtils.clamp(player.position.z, CFG.finishZ - 1, CFG.startZ + 3);
  }

  player.userData.moving = isMoving;
}


// ═══════════════════════════════════════════════════
//  NPC AI UPDATE
// ═══════════════════════════════════════════════════

function updateNPCs(dt) {
  npcs.forEach(npc => {
    if (!npc.userData.alive) return;

    // Already past finish line
    if (npc.position.z <= CFG.finishZ) {
      npc.userData.moving = false;
      return;
    }

    if (phase === 'green') {
      // ── Move toward finish with zigzag ──
      const speed = npc.userData.speed * dt;
      npc.position.z -= speed;
      // Sinusoidal lateral movement (changes direction over time)
      npc.userData.lateralTimer += dt * (1.5 + npc.userData.speed * 0.3);
      const lateralMove = Math.sin(npc.userData.lateralTimer) * npc.userData.lateralDrift * dt;
      npc.position.x += lateralMove;
      // Keep in bounds
      const halfW = CFG.fieldWidth / 2 - 1;
      npc.position.x = THREE.MathUtils.clamp(npc.position.x, -halfW, halfW);
      // Face movement direction (slight angle based on lateral motion)
      npc.rotation.y = Math.PI + lateralMove * 2;
      npc.userData.moving = true;

    } else if (phase === 'turning-red' || phase === 'red') {
      // ── Doomed NPCs keep running (fail to stop) ──
      if (npc.userData.markedForDeath && npc.userData.redLightFailLeft > 0) {
        npc.userData.redLightFailLeft -= dt;
        // Visibly stumble forward at partial speed
        npc.position.z -= npc.userData.speed * dt * 0.6;
        npc.userData.moving = true;
      } else {
        npc.userData.moving = false;
      }

    } else {
      // turning-green: stand still
      npc.userData.moving = false;
    }
  });
}


// ═══════════════════════════════════════════════════
//  WALK / IDLE ANIMATIONS
// ═══════════════════════════════════════════════════

function animateCharacter(char, dt) {
  if (!char.userData.legL) return;

  if (char.userData.moving && char.userData.alive) {
    // Walk cycle: swing legs and arms, bob vertically
    char.userData.walkPhase += dt * 10;
    const swing = Math.sin(char.userData.walkPhase) * 0.35;
    char.userData.legL.rotation.x =  swing;
    char.userData.legR.rotation.x = -swing;
    char.userData.armL.rotation.x = -swing * 0.5;
    char.userData.armR.rotation.x =  swing * 0.5;
    // Vertical bobbing
    char.position.y = Math.abs(Math.sin(char.userData.walkPhase * 2)) * 0.06;
  } else {
    // Return to rest pose smoothly
    char.userData.legL.rotation.x *= 0.85;
    char.userData.legR.rotation.x *= 0.85;
    char.userData.armL.rotation.x *= 0.85;
    char.userData.armR.rotation.x *= 0.85;
    if (char.position.y > 0.001) char.position.y *= 0.9;
    else char.position.y = 0;
  }
}


// ═══════════════════════════════════════════════════
//  CAMERA
// ═══════════════════════════════════════════════════

/**
 * Instantly place camera behind player (no lerp). Used on game start/restart.
 */
function snapCameraToPlayer() {
  camera.position.set(
    player.position.x * 0.7,
    CFG.camHeight,
    player.position.z + CFG.camDistance
  );
  camera.lookAt(player.position.x * 0.9, 1.6, player.position.z - 4);
}

function updateCamera(dt) {
  const target = new THREE.Vector3(
    player.position.x * 0.7,
    CFG.camHeight + player.position.y,
    player.position.z + CFG.camDistance
  );
  camera.position.lerp(target, CFG.camLerp * dt);

  const lookTarget = new THREE.Vector3(
    player.position.x * 0.9,
    1.6,
    player.position.z - 4
  );
  camera.lookAt(lookTarget);
}


// ═══════════════════════════════════════════════════
//  MAIN GAME LOOP
// ═══════════════════════════════════════════════════

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05); // cap to prevent large jumps

  // ── Game logic (only when playing) ──
  if (gameState === 'playing') {
    // Countdown timer (only ticks during green light / movement phase)
    if (phase === 'green') timeLeft -= dt;
    if (timeLeft <= 0) {
      timeLeft = 0;
      gameState = 'lost';
      if (currentAudio) { currentAudio.pause(); currentAudio = null; }
      showCenterMsg("TIME'S UP!\nELIMINATED");
      document.getElementById('restart-btn').style.display = 'block';
    }

    // Controls hint auto-hide
    if (controlsHintTimer > 0) {
      controlsHintTimer -= dt;
      if (controlsHintTimer <= 0) {
        document.getElementById('controls-hint').style.opacity = '0';
      }
    }

    // ── Young-hee rotation ──
    if (yhTurning) {
      yhTurnProgress += dt / CFG.turnDuration;
      if (yhTurnProgress >= 1) {
        yhTurnProgress = 1;
        yhTurning = false;
      }
      younghee.rotation.y = yhStartRot + (yhEndRot - yhStartRot) * smoothstep(yhTurnProgress);
    }

    // ── Update player and NPCs ──
    updatePlayer(dt);
    updateNPCs(dt);

    // ── Red light detection ──
    if (phase === 'red') {
      redLightTimer += dt;

      // Check player movement
      if (player.userData.alive && playerPrevPos) {
        const d = player.position.distanceTo(playerPrevPos);
        if (d > CFG.detectionThreshold) {
          queueElimination(player, true, 0);
        }
      }

      // Check doomed NPCs: once they stop moving, queue them for elimination
      npcs.forEach(npc => {
        if (!npc.userData.alive) return;
        if (!npc.userData.markedForDeath) return;
        // Wait until this NPC has finished stumbling (failLeft <= 0) then shoot
        if (npc.userData.redLightFailLeft <= 0 && !npc.userData.deathQueued) {
          npc.userData.deathQueued = true;
          // Small stagger based on distance from Young-hee (closer = shot first)
          const distFromDoll = Math.abs(npc.position.z - CFG.dollZ);
          const delay = 0.1 + (distFromDoll / 130) * 0.8; // 0.1s ~ 0.9s
          queueElimination(npc, false, delay);
        }
      });

      // End red light phase (wait long enough for all executions)
      if (redLightTimer >= redLightDuration) {
        beginGreenLight();
      }
    }

    // ── Win check ──
    if (player.userData.alive && player.position.z <= CFG.finishZ) {
      gameState = 'won';
      if (currentAudio) { currentAudio.pause(); currentAudio = null; }
      playWinSound();
      showCenterMsg('YOU WIN!');
      document.getElementById('restart-btn').style.display = 'block';
    }

    updateHUD();
  }

  // ── Process elimination queue ──
  elimQueue = elimQueue.filter(e => {
    e.delay -= dt;
    if (e.delay <= 0) {
      executeElimination(e.char, e.isPlayer);
      return false;
    }
    return true;
  });

  // ── Collapse animations ──
  elimAnims = elimAnims.filter(e => {
    e.progress += dt * 2.2;
    const t = Math.min(e.progress, 1);
    e.char.rotation.x = (Math.PI / 2) * smoothstep(t);
    e.char.position.y = -0.25 * smoothstep(t);
    return t < 1;
  });

  // ── Particle physics ──
  particles = particles.filter(p => {
    p.userData.life -= dt * 1.2;
    if (p.userData.life <= 0) { scene.remove(p); return false; }
    p.position.addScaledVector(p.userData.vel, dt);
    p.userData.vel.y -= 12 * dt; // gravity
    if (p.position.y < 0.02) {
      p.position.y = 0.02;
      p.userData.vel.y *= -0.3;
      p.userData.vel.x *= 0.7;
      p.userData.vel.z *= 0.7;
    }
    p.material.opacity = Math.max(0, p.userData.life);
    return true;
  });

  // ── Laser beam fade ──
  laserBeams = laserBeams.filter(l => {
    l.life -= dt;
    if (l.life <= 0) { scene.remove(l.mesh); return false; }
    l.mesh.material.opacity = l.life / 0.4;
    return true;
  });

  // ── Finish line pulse ──
  if (finishLineMesh) {
    finishLineMesh.material.emissiveIntensity = 0.3 + 0.25 * Math.sin(Date.now() * 0.004);
  }

  // ── Animate all characters ──
  if (player.userData.alive) animateCharacter(player, dt);
  npcs.forEach(n => { if (n.userData.alive) animateCharacter(n, dt); });

  // ── NPC idle sway during red light (subtle nervousness) ──
  if (phase === 'red' || phase === 'turning-red') {
    npcs.forEach(n => {
      if (n.userData.alive && !n.userData.moving) {
        n.userData.swayPhase += dt * n.userData.swaySpeed;
        // Very subtle body sway (doesn't trigger detection because position doesn't change)
        n.rotation.z = Math.sin(n.userData.swayPhase) * 0.008;
      }
    });
  }

  // ── Young-hee eye pulse during red light ──
  if (phase === 'red') {
    const pulse = 1.8 + 0.7 * Math.sin(Date.now() * 0.008);
    dollEyes.forEach(e => { e.material.emissiveIntensity = pulse; });
  }

  // ── Camera ──
  updateCamera(dt);

  // ── Render ──
  renderer.render(scene, camera);
}

/**
 * Smooth interpolation function (ease in/out).
 */
function smoothstep(t) {
  return t * t * (3 - 2 * t);
}


// ═══════════════════════════════════════════════════
//  VIRTUAL JOYSTICK (MOBILE)
// ═══════════════════════════════════════════════════

function initJoystick() {
  const zone = document.getElementById('joystick-zone');
  const thumb = document.getElementById('joystick-thumb');
  zone.style.display = 'block';

  // Update UI text for mobile
  document.getElementById('start-hint').textContent = 'Tap START to begin — use joystick to move';
  document.getElementById('controls-hint').textContent = 'Use joystick to move — Only during Green Light!';

  let activeTouchId = null;
  const baseRect = () => zone.getBoundingClientRect();
  const DEAD_ZONE = 0.15; // 15% dead zone

  function handleTouch(e) {
    e.preventDefault();
    for (const touch of e.changedTouches) {
      if (activeTouchId !== null && touch.identifier !== activeTouchId) continue;

      const rect = baseRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      const radius = rect.width / 2;

      const dx = touch.clientX - centerX;
      const dy = touch.clientY - centerY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const clampedDist = Math.min(dist, radius);
      const normDist = clampedDist / radius;

      // Position thumb visually
      const angle = Math.atan2(dy, dx);
      const thumbX = Math.cos(angle) * clampedDist;
      const thumbY = Math.sin(angle) * clampedDist;
      thumb.style.transform = `translate(calc(-50% + ${thumbX}px), calc(-50% + ${thumbY}px))`;
      thumb.classList.add('active');

      // Map to keys (8-direction with dead zone)
      keys['ArrowUp'] = false;
      keys['ArrowDown'] = false;
      keys['ArrowLeft'] = false;
      keys['ArrowRight'] = false;

      if (normDist > DEAD_ZONE) {
        const normX = Math.cos(angle);
        const normY = Math.sin(angle);
        // Use 0.38 threshold for diagonals (~22.5 degrees)
        if (normY < -0.38) keys['ArrowUp'] = true;
        if (normY >  0.38) keys['ArrowDown'] = true;
        if (normX < -0.38) keys['ArrowLeft'] = true;
        if (normX >  0.38) keys['ArrowRight'] = true;
      }
    }
  }

  function handleTouchEnd(e) {
    e.preventDefault();
    for (const touch of e.changedTouches) {
      if (touch.identifier === activeTouchId) {
        activeTouchId = null;
        // Reset thumb position
        thumb.style.transform = 'translate(-50%, -50%)';
        thumb.classList.remove('active');
        // Release all keys
        keys['ArrowUp'] = false;
        keys['ArrowDown'] = false;
        keys['ArrowLeft'] = false;
        keys['ArrowRight'] = false;
      }
    }
  }

  zone.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (activeTouchId === null) {
      activeTouchId = e.changedTouches[0].identifier;
    }
    handleTouch(e);
  }, { passive: false });

  zone.addEventListener('touchmove', handleTouch, { passive: false });
  zone.addEventListener('touchend', handleTouchEnd, { passive: false });
  zone.addEventListener('touchcancel', handleTouchEnd, { passive: false });
}


// ═══════════════════════════════════════════════════
//  LAUNCH
// ═══════════════════════════════════════════════════
init();
</script>
